<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff & Services Finder</title>
  <link rel="stylesheet" href="https://cdn.ons.gov.uk/sdc/design-system/73.3.0/css/main.css">
  <link rel="stylesheet" href="css/chat-widget.css">
  <style>
    #app { min-height: 60vh; }

    /* Search input override for large hero style */
    .search-input {
      width: 100%;
      font-size: 1.5rem;
      padding: 12px 16px;
      border: 2px solid #222;
      font-family: inherit;
      margin-bottom: 24px;
    }
    .search-input:focus { outline: 3px solid #fd0; border-color: #222; }

    /* Team grid */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .team-card {
      background: #fff; border: 1px solid #707071; padding: 20px;
      text-decoration: none; color: #222; display: block; transition: box-shadow 0.15s;
    }
    .team-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); color: #222; }
    .team-card h3 { font-size: 1.125rem; margin-bottom: 8px; color: #206095; }
    .team-card .meta { font-size: 0.875rem; color: #707071; }

    /* Section headings */
    .results-section { margin-bottom: 28px; }
    .results-section h2 { font-size: 1.125rem; border-bottom: 2px solid #206095; padding-bottom: 6px; margin-bottom: 12px; }
    .results-section h2 span { font-weight: 400; color: #707071; }

    /* Person card */
    .person-card {
      background: #fff; border: 1px solid #707071; padding: 16px 20px;
      margin-bottom: 8px; display: block; text-decoration: none; color: #222; transition: box-shadow 0.15s;
    }
    .person-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); color: #222; }
    .person-card .name { font-weight: 700; font-size: 1rem; color: #206095; }
    .person-card .role-team { font-size: 0.875rem; color: #707071; margin: 4px 0; }
    .person-card .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }

    /* Skill tags */
    .tag { display: inline-block; background: #e2e2e3; font-size: 0.8125rem; padding: 1px 8px; border-radius: 3px; }

    /* Allocation bar */
    .alloc-bar-wrap { display: inline-flex; align-items: center; gap: 8px; margin-top: 6px; }
    .alloc-bar { width: 120px; height: 12px; background: #e2e2e3; border-radius: 4px; overflow: hidden; position: relative; display: block; }
    .alloc-bar-fill { height: 100%; border-radius: 4px; min-width: 4px; display: block; }
    .alloc-bar-fill.green { background: #0f8243; }
    .alloc-bar-fill.amber { background: #fe781f; }
    .alloc-bar-fill.red { background: #d0021b; }
    .alloc-bar-marker { position: absolute; top: 0; bottom: 0; width: 2px; background: #222; opacity: 0.5; }
    .alloc-label { font-size: 0.8125rem; font-weight: 700; }
    .alloc-label.red { color: #d0021b; }
    .alloc-label.amber { color: #fe781f; }

    /* Ticket card */
    .ticket-card { background: #fff; border: 1px solid #707071; padding: 14px 20px; margin-bottom: 8px; }
    .ticket-card .desc { font-size: 0.875rem; margin: 6px 0; }
    .ticket-card .ticket-meta { font-size: 0.8125rem; color: #707071; }

    /* Status dot */
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .status-dot.open { background: #fe781f; }
    .status-dot.resolved { background: #0f8243; }

    /* No results */
    .no-results { color: #707071; font-size: 1rem; padding: 20px 0; }

    /* Back link */
    .back-link { display: inline-block; margin-bottom: 20px; font-size: 1rem; }

    /* Profile header */
    .profile-header { margin-bottom: 24px; }
    .profile-header .name { font-size: 1.875rem; font-weight: 700; margin-bottom: 4px; }
    .profile-header .meta-line { font-size: 1rem; color: #707071; margin: 4px 0; }

    /* Grade badge */
    .grade-badge { display: inline-block; font-size: 0.8125rem; font-weight: 700; padding: 2px 10px; border-radius: 3px; color: #fff; vertical-align: middle; margin-left: 8px; }
    .grade-badge.G6  { background: #4c2c92; }
    .grade-badge.G7  { background: #206095; }
    .grade-badge.SEO { background: #10403c; }
    .grade-badge.HEO { background: #0f8243; }
    .grade-badge.EO  { background: #fe781f; }
    .grade-badge.AO  { background: #707071; color: #fff; }

    /* Profile section */
    .profile-section { margin-bottom: 24px; }
    .profile-section h3 { font-size: 1rem; margin-bottom: 8px; border-bottom: 1px solid #707071; padding-bottom: 4px; }

    /* Stacked allocation bar */
    .stacked-bar-wrap { margin: 12px 0; }
    .stacked-bar { display: flex; height: 32px; border-radius: 4px; overflow: hidden; background: #e2e2e3; }
    .stacked-bar .segment { display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #fff; overflow: hidden; white-space: nowrap; padding: 0 6px; }
    .stacked-bar-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; font-size: 0.8125rem; }
    .stacked-bar-legend .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
    .alloc-total { font-size: 1rem; font-weight: 700; margin-top: 6px; }

    /* Member link */
    .member-link { display: inline-block; margin-right: 12px; margin-bottom: 4px; }

    /* Stats row */
    .stats-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
    .stat-box { background: #fff; border: 1px solid #707071; padding: 14px 20px; flex: 1; min-width: 140px; text-align: center; }
    .stat-box .stat-value { font-size: 1.75rem; font-weight: 700; }
    .stat-box .stat-label { font-size: 0.8125rem; color: #707071; }

    /* ONS table row warn */
    .ons-table__row--warn .ons-table__cell { background: #fae1e1; }
    .ons-table__row--clickable { cursor: pointer; }
    .ons-table__row--clickable:hover .ons-table__cell { background: #e8f0f8; }
    .ons-table__row--warn.ons-table__row--clickable:hover .ons-table__cell { background: #f5d0d0; }

    /* Ticket list item */
    .ticket-list-item { background: #fff; border: 1px solid #707071; padding: 12px 16px; margin-bottom: 6px; }
    .ticket-list-item .desc { font-size: 0.875rem; margin: 4px 0 0; }
  </style>
</head>
<body>
  <div class="ons-page">
    <div class="ons-page__content">

      <header class="ons-header ons-header--internal" role="banner">
        <div class="ons-header__top">
          <div class="ons-container ons-container--wide">
            <div class="ons-header__grid-top ons-grid ons-grid-flex ons-grid-flex--between ons-grid-flex--vertical-center ons-grid-flex--no-wrap ons-grid--gutterless">
              <div class="ons-grid__col ons-col-auto">
                <div class="ons-header__title">Directorate of Corporate Services</div>
              </div>
            </div>
          </div>
        </div>
        <div class="ons-navigation-wrapper">
          <div class="ons-container ons-container--wide">
            <nav class="ons-navigation ons-navigation--main" aria-label="Main menu">
              <ul class="ons-navigation__list">
                <li class="ons-navigation__item"><a class="ons-navigation__link" href="dashboard.html">Director's Dashboard</a></li>
                <li class="ons-navigation__item"><a class="ons-navigation__link" href="operations.html">Operations View</a></li>
                <li class="ons-navigation__item"><a class="ons-navigation__link" href="tickets.html">Ticket View</a></li>
                <li class="ons-navigation__item ons-navigation__item--active"><a class="ons-navigation__link" href="index.html">Staff Finder</a></li>
              </ul>
            </nav>
          </div>
        </div>
      </header>

      <main id="main-content">
        <div class="ons-container ons-container--wide ons-u-mt-l">
          <div id="app"></div>
        </div>
      </main>

      <footer class="ons-footer">
        <div class="ons-footer__body ons-page__footer">
          <div class="ons-container ons-container--wide">
            <div class="ons-footer__license ons-u-mb-l">
              Prototype — AI Hackathon V1 April 2026 · Challenge 4: Knowing your own organisation
            </div>
          </div>
        </div>
      </footer>

    </div>
  </div>

  <script>
  let DATA = { people: [], tickets: [], orgChart: null };
  let peopleById = new Map();
  let teamsByName = new Map();
  let searchIndex = [];

  async function loadFinderData() {
    const [people, tickets, orgChart] = await Promise.all([
      fetch('data/workforce.json').then(r => r.json()),
      fetch('data/tickets.json').then(r => r.json()),
      fetch('data/org-chart.json').then(r => r.json()),
    ]);
    DATA = { people, tickets, orgChart };
    for (const p of people) peopleById.set(p.employee_id, p);
    for (const t of orgChart.teams) {
      const members = t.members.map(id => peopleById.get(id)).filter(Boolean);
      const teamTickets = tickets.filter(tk => tk.assigned_team === t.team);
      const openTickets = teamTickets.filter(tk => tk.status === 'open');
      teamsByName.set(t.team, { ...t, memberObjects: members, tickets: teamTickets, openTickets, openTicketCount: openTickets.length });
    }
    for (const p of people) {
      searchIndex.push({ type: 'person', id: p.employee_id, text: [p.name, p.role, p.team, ...p.skills, ...p.allocations.map(a => a.project)].join(' ').toLowerCase(), data: p });
    }
    for (const tk of tickets) {
      searchIndex.push({ type: 'ticket', id: tk.ticket_id, text: [tk.description, tk.category, tk.assigned_team].join(' ').toLowerCase(), data: tk });
    }
  }

  const app = document.getElementById('app');

  function navigate() {
    const hash = location.hash || '#/';
    if (hash.startsWith('#/person/')) renderPerson(hash.replace('#/person/', ''));
    else if (hash.startsWith('#/team/')) renderTeam(decodeURIComponent(hash.replace('#/team/', '')));
    else renderSearch();
  }

  // Helpers
  function allocColor(pct) { return pct > 100 ? 'red' : pct > 80 ? 'amber' : 'green'; }
  function allocBarHTML(pct) {
    const col = allocColor(pct);
    const w = Math.min(Math.round(pct * 100 / 120), 100);
    const marker = Math.round(100 * 100 / 120);
    return `<span class="alloc-bar-wrap">
      <span class="alloc-bar">
        <span class="alloc-bar-fill ${col}" style="width:${w}%"></span>
        <span class="alloc-bar-marker" style="left:${marker}%" title="100% capacity"></span>
      </span>
      <span class="alloc-label ${col}">${pct}%</span>
    </span>`;
  }
  function priorityBadge(p) {
    const cls = p === 'high' ? 'error' : p === 'medium' ? 'pending' : 'info';
    return `<span class="ons-status ons-status--${cls}">${p}</span>`;
  }
  function statusDot(s) { return `<span class="status-dot ${s}"></span>`; }
  function formatCategory(cat) { return cat.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()); }

  let debounceTimer;
  function debounce(fn, ms) { return (...args) => { clearTimeout(debounceTimer); debounceTimer = setTimeout(() => fn(...args), ms); }; }

  // Search view
  let lastSearchQuery = '';
  function renderSearch(restoredQuery) {
    const query = restoredQuery || lastSearchQuery || '';
    lastSearchQuery = query;
    let html = `<input class="search-input ons-input ons-input--text" type="text" placeholder="Search people, skills, teams, or topics\u2026" value="${query.replace(/"/g, '&quot;')}">`;

    if (!query.trim()) {
      html += '<div class="team-grid">';
      for (const [name, t] of teamsByName) {
        html += `<a class="team-card" href="#/team/${encodeURIComponent(name)}">
          <h3>${name}</h3>
          <div class="meta">${t.headcount} people</div>
          <span class="ons-status ons-status--${t.openTicketCount === 0 ? 'success' : 'pending'}">${t.openTicketCount} open ticket${t.openTicketCount !== 1 ? 's' : ''}</span>
        </a>`;
      }
      html += '</div>';
    } else {
      const q = query.toLowerCase().trim();
      const matchedPeople = [], matchedTickets = [], matchedTeamNames = new Set();
      for (const entry of searchIndex) {
        if (!entry.text.includes(q)) continue;
        if (entry.type === 'person') matchedPeople.push(entry.data);
        if (entry.type === 'ticket') matchedTickets.push(entry.data);
      }
      for (const [name] of teamsByName) { if (name.toLowerCase().includes(q)) matchedTeamNames.add(name); }
      for (const tk of matchedTickets) matchedTeamNames.add(tk.assigned_team);
      const hasResults = matchedPeople.length || matchedTeamNames.size || matchedTickets.length;
      if (!hasResults) html += '<p class="no-results">No results found. Try a different search term.</p>';

      if (matchedPeople.length) {
        html += `<div class="results-section"><h2>People <span>(${matchedPeople.length})</span></h2>`;
        for (const p of matchedPeople) {
          html += `<a class="person-card" href="#/person/${p.employee_id}">
            <div class="name">${p.name}</div>
            <div class="role-team">${p.role} · ${p.team} · ${p.location}</div>
            <div class="tags">${p.skills.map(s => `<span class="tag">${s}</span>`).join('')}</div>
            ${allocBarHTML(p.total_allocation)}
          </a>`;
        }
        html += '</div>';
      }
      if (matchedTeamNames.size) {
        html += `<div class="results-section"><h2>Teams <span>(${matchedTeamNames.size})</span></h2><div class="team-grid">`;
        for (const name of matchedTeamNames) {
          const t = teamsByName.get(name);
          if (!t) continue;
          html += `<a class="team-card" href="#/team/${encodeURIComponent(name)}">
            <h3>${name}</h3>
            <div class="meta">${t.headcount} people</div>
            <span class="ons-status ons-status--${t.openTicketCount === 0 ? 'success' : 'pending'}">${t.openTicketCount} open ticket${t.openTicketCount !== 1 ? 's' : ''}</span>
          </a>`;
        }
        html += '</div></div>';
      }
      if (matchedTickets.length) {
        html += `<div class="results-section"><h2>Related Tickets <span>(${matchedTickets.length})</span></h2>`;
        for (const tk of matchedTickets) {
          html += `<div class="ticket-card">
            ${statusDot(tk.status)} ${priorityBadge(tk.priority)}
            <span style="font-size:0.8125rem;color:#707071;margin-left:6px">${formatCategory(tk.category)}</span>
            <div class="desc">${tk.description}</div>
            <div class="ticket-meta">${tk.ticket_id} · <a href="#/team/${encodeURIComponent(tk.assigned_team)}">${tk.assigned_team}</a></div>
          </div>`;
        }
        html += '</div>';
      }
    }
    app.innerHTML = html;
    const input = app.querySelector('.search-input');
    if (input) {
      input.focus();
      input.addEventListener('input', debounce(e => {
        lastSearchQuery = e.target.value;
        renderSearch(e.target.value);
        const pos = e.target.selectionStart;
        const newInput = app.querySelector('.search-input');
        if (newInput) { newInput.focus(); newInput.setSelectionRange(pos, pos); }
      }, 200));
    }
  }

  const segmentPalette = ['#206095', '#4c2c92', '#0f8243', '#fe781f', '#d0021b', '#5694ca', '#871a5b'];

  function tenure(startDate) {
    const start = new Date(startDate), now = new Date();
    let years = now.getFullYear() - start.getFullYear(), months = now.getMonth() - start.getMonth();
    if (months < 0) { years--; months += 12; }
    const parts = [];
    if (years > 0) parts.push(`${years} year${years !== 1 ? 's' : ''}`);
    if (months > 0) parts.push(`${months} month${months !== 1 ? 's' : ''}`);
    return parts.join(', ') || 'Less than a month';
  }

  // Person profile
  function renderPerson(id) {
    const p = peopleById.get(id);
    if (!p) { app.innerHTML = '<p>Person not found.</p>'; return; }
    const col = allocColor(p.total_allocation);
    let leadsTeam = null;
    for (const [, t] of teamsByName) { if (t.team_lead === p.employee_id) { leadsTeam = t; break; } }

    let html = `<a class="back-link" href="#/">&larr; Back to search</a>`;
    html += `<div class="profile-header">
      <div class="name">${p.name} <span class="grade-badge ${p.grade}">${p.grade}</span></div>
      <div class="meta-line">${p.role}</div>
      <div class="meta-line"><a href="#/team/${encodeURIComponent(p.team)}">${p.team}</a> · ${p.location}</div>
      <div class="meta-line">Joined ${new Date(p.start_date).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' })} · ${tenure(p.start_date)}</div>
    </div>`;

    html += `<div class="profile-section"><h3>Skills</h3>
      <div class="tags">${p.skills.map(s => `<span class="tag">${s}</span>`).join('')}</div>
    </div>`;

    html += `<div class="profile-section"><h3>Project Allocations</h3><div class="stacked-bar-wrap"><div class="stacked-bar">`;
    for (let i = 0; i < p.allocations.length; i++) {
      const a = p.allocations[i], bg = segmentPalette[i % segmentPalette.length];
      html += `<div class="segment" style="width:${a.percentage}%;background:${bg}" title="${a.project}: ${a.percentage}%">${a.percentage > 15 ? a.project + ' ' + a.percentage + '%' : a.percentage + '%'}</div>`;
    }
    html += `</div><div class="stacked-bar-legend">`;
    for (let i = 0; i < p.allocations.length; i++) {
      const a = p.allocations[i], bg = segmentPalette[i % segmentPalette.length];
      html += `<span><span class="swatch" style="background:${bg}"></span>${a.project} (${a.percentage}%)</span>`;
    }
    html += `</div><div class="alloc-total" style="color:${col === 'red' ? '#d0021b' : col === 'amber' ? '#fe781f' : '#0f8243'}">Total: ${p.total_allocation}%</div></div></div>`;

    if (leadsTeam) {
      html += `<div class="profile-section"><h3>Leads: <a href="#/team/${encodeURIComponent(leadsTeam.team)}">${leadsTeam.team}</a></h3>`;
      const others = leadsTeam.memberObjects.filter(m => m.employee_id !== p.employee_id);
      html += `<div>${others.map(m => `<a class="member-link" href="#/person/${m.employee_id}">${m.name} (${m.role})</a>`).join('')}</div></div>`;
    }
    app.innerHTML = html;
  }

  // Team overview
  function renderTeam(name) {
    const t = teamsByName.get(name);
    if (!t) { app.innerHTML = '<p>Team not found.</p>'; return; }
    const lead = peopleById.get(t.team_lead);
    const avgAlloc = Math.round(t.memberObjects.reduce((sum, m) => sum + m.total_allocation, 0) / t.memberObjects.length);
    const overAlloc = t.memberObjects.filter(m => m.total_allocation > 100).length;
    const totalTickets = t.tickets.length;
    const resolvedTickets = t.tickets.filter(tk => tk.status === 'resolved').length;

    let html = `<a class="back-link" href="#/">&larr; Back to search</a>`;
    html += `<div class="profile-header">
      <div class="name">${t.team}</div>
      <div class="meta-line">Led by: ${lead ? `<a href="#/person/${lead.employee_id}">${lead.name}</a>` : 'Unknown'}</div>
    </div>`;

    html += `<div class="stats-row">
      <div class="stat-box"><div class="stat-value">${t.headcount}</div><div class="stat-label">People</div></div>
      <div class="stat-box"><div class="stat-value" style="color:${avgAlloc > 100 ? '#d0021b' : avgAlloc > 80 ? '#fe781f' : '#0f8243'}">${avgAlloc}%</div><div class="stat-label">Avg Allocation</div></div>
      <div class="stat-box"><div class="stat-value" style="color:${overAlloc > 0 ? '#d0021b' : '#0f8243'}">${overAlloc}</div><div class="stat-label">Over-allocated</div></div>
      <div class="stat-box"><div class="stat-value" style="color:${t.openTicketCount > 0 ? '#fe781f' : '#0f8243'}">${t.openTicketCount}/${totalTickets}</div><div class="stat-label">Open / Total Tickets</div></div>
    </div>`;

    html += `<div class="profile-section"><h3>Team Members</h3>
    <div class="ons-table-scrollable__content"><table class="ons-table">
      <thead class="ons-table__head"><tr class="ons-table__row">
        <th class="ons-table__header" scope="col">Name</th>
        <th class="ons-table__header" scope="col">Role</th>
        <th class="ons-table__header" scope="col">Grade</th>
        <th class="ons-table__header" scope="col">Allocation</th>
        <th class="ons-table__header" scope="col">Location</th>
      </tr></thead>
      <tbody class="ons-table__body">`;
    for (const m of t.memberObjects) {
      const over = m.total_allocation > 100;
      html += `<tr class="ons-table__row ons-table__row--clickable${over ? ' ons-table__row--warn' : ''}" onclick="location.hash='#/person/${m.employee_id}'">
        <td class="ons-table__cell" style="color:#206095;font-weight:700">${m.name}</td>
        <td class="ons-table__cell">${m.role}</td>
        <td class="ons-table__cell"><span class="grade-badge ${m.grade}">${m.grade}</span></td>
        <td class="ons-table__cell">${allocBarHTML(m.total_allocation)}</td>
        <td class="ons-table__cell">${m.location}</td>
      </tr>`;
    }
    html += `</tbody></table></div></div>`;

    const priorityOrder = { high: 0, medium: 1, low: 2 };
    const openSorted = [...t.openTickets].sort((a, b) => (priorityOrder[a.priority] || 9) - (priorityOrder[b.priority] || 9));
    html += `<div class="profile-section"><h3>Open Tickets (${t.openTicketCount})</h3>`;
    if (openSorted.length === 0) {
      html += '<p style="color:#707071">No open tickets.</p>';
    } else {
      for (const tk of openSorted) {
        html += `<div class="ticket-list-item">
          ${statusDot('open')} ${priorityBadge(tk.priority)}
          <span style="font-size:0.8125rem;color:#707071;margin-left:6px">${formatCategory(tk.category)}</span>
          <div class="desc">${tk.description}</div>
          <div style="font-size:0.75rem;color:#707071;margin-top:2px">${tk.ticket_id} · Opened ${tk.created_date}</div>
        </div>`;
      }
    }
    html += `</div>`;

    html += `<div class="profile-section"><h3>Resolved Tickets</h3>
      <p style="font-size:0.875rem;color:#707071">${resolvedTickets} ticket${resolvedTickets !== 1 ? 's' : ''} resolved</p>
    </div>`;
    app.innerHTML = html;
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await loadFinderData();
    await loadData();
    window.addEventListener('hashchange', navigate);
    navigate();
  });
  </script>

  <script src="js/data.js"></script>
  <script src="js/insights.js"></script>
  <script src="js/chat-widget.js"></script>
  <script>
    (function() {
      var s = ['https://cdn.ons.gov.uk/sdc/design-system/73.3.0/scripts/main.js'];
      var c = document.createElement('script');
