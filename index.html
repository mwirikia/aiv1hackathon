<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff and Services Finder</title>
  <link rel="stylesheet" href="https://cdn.ons.gov.uk/sdc/design-system/73.3.0/css/main.css">
  <style>
    .finder-main {
      min-height: 60vh;
    }

    .finder-search-wrap {
      max-width: 54rem;
    }

    .finder-team-card {
      border: 1px solid #bfbfbf;
      background: #fff;
      padding: 1rem;
      height: 100%;
    }

    .finder-team-card h3 {
      margin-bottom: 0.5rem;
    }

    .finder-team-card p {
      margin-bottom: 0.6rem;
      color: #3d3d3d;
    }

    .finder-panel-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .finder-panel-link:hover .finder-team-card,
    .finder-panel-link:hover .finder-result-panel {
      border-color: #206095;
      box-shadow: 0 0 0 2px #206095 inset;
    }

    .finder-result-panel {
      border: 1px solid #bfbfbf;
      background: #fff;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }

    .finder-tag {
      display: inline-block;
      background: #e9eff5;
      color: #033e72;
      border: 1px solid #a8bdd1;
      font-size: 0.8rem;
      padding: 0.1rem 0.5rem;
      margin: 0 0.3rem 0.3rem 0;
      border-radius: 1rem;
      white-space: nowrap;
    }

    .finder-badge {
      margin-left: 0.35rem;
    }

    .finder-alloc {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.55rem;
    }

    .finder-alloc__track {
      width: 8.5rem;
      height: 0.55rem;
      border-radius: 999px;
      background: #dcdcdc;
      overflow: hidden;
    }

    .finder-alloc__fill {
      height: 100%;
      border-radius: 999px;
    }

    .finder-alloc__fill--green {
      background: #0f8243;
    }

    .finder-alloc__fill--amber {
      background: #fe781f;
    }

    .finder-alloc__fill--red {
      background: #d0021b;
    }

    .finder-alloc__label {
      font-weight: 700;
      font-size: 0.85rem;
    }

    .finder-alloc__label--green {
      color: #0f8243;
    }

    .finder-alloc__label--amber {
      color: #c44a00;
    }

    .finder-alloc__label--red {
      color: #d0021b;
    }

    .finder-inline-meta {
      color: #707071;
      font-size: 0.95rem;
      margin-top: 0.3rem;
    }

    .finder-section-heading {
      margin-bottom: 0.7rem;
    }

    .finder-status-inline {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: #3d3d3d;
    }

    .finder-status-dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 999px;
      display: inline-block;
      margin-right: 0.2rem;
    }

    .finder-status-dot--open {
      background: #fe781f;
    }

    .finder-status-dot--resolved {
      background: #0f8243;
    }

    .finder-stacked-wrap {
      margin-top: 0.75rem;
    }

    .finder-stacked {
      display: flex;
      height: 2rem;
      border-radius: 0.2rem;
      overflow: hidden;
      background: #dcdcdc;
    }

    .finder-stacked__segment {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0 0.3rem;
      white-space: nowrap;
      overflow: hidden;
    }

    .finder-legend {
      margin-top: 0.6rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      font-size: 0.8rem;
    }

    .finder-legend__swatch {
      width: 0.75rem;
      height: 0.75rem;
      display: inline-block;
      margin-right: 0.25rem;
      border-radius: 0.1rem;
      vertical-align: middle;
    }

    .finder-clickable-row {
      cursor: pointer;
    }

    .finder-clickable-row:hover {
      background: #f2f6fb;
    }

    .finder-row-alert {
      background: #fff3f3;
    }

    .finder-row-alert:hover {
      background: #ffe9e9;
    }
  </style>
</head>
<body>
  <div class="ons-page">
    <div class="ons-page__content">
      <header class="ons-header ons-header--internal" role="banner">
        <div class="ons-header__top">
          <div class="ons-container ons-container--wide">
            <div class="ons-header__grid-top ons-grid ons-grid-flex ons-grid-flex--between ons-grid-flex--vertical-center ons-grid-flex--no-wrap ons-grid--gutterless">
              <div class="ons-grid__col ons-col-auto">
                <div class="ons-header__title">Staff and Services Finder</div>
              </div>
              <div class="ons-grid__col ons-col-auto">
                <a href="dashboard.html" style="color:#fff;font-size:0.95rem;text-decoration:underline;">Director dashboard</a>
              </div>
            </div>
          </div>
        </div>
        <div class="ons-header__main">
          <div class="ons-container ons-container--wide">
            <div class="ons-header__title">Directorate of Corporate Services</div>
          </div>
        </div>
      </header>

      <main id="main-content" class="finder-main">
        <div class="ons-container ons-container--wide ons-u-pt-l ons-u-pb-xl">
          <div id="app"></div>
        </div>
      </main>

      <footer class="ons-footer">
        <div class="ons-footer__body ons-page__footer">
          <div class="ons-container ons-container--wide">
            <div class="ons-footer__license ons-u-mb-l">
              Prototype: AI Hackathon V1 April 2026
            </div>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <script>
  let DATA = { people: [], tickets: [], orgChart: null };
  let peopleById = new Map();
  let teamsByName = new Map();
  let searchIndex = [];

  async function loadData() {
    const [people, tickets, orgChart] = await Promise.all([
      fetch('data/workforce.json').then(r => r.json()),
      fetch('data/tickets.json').then(r => r.json()),
      fetch('data/org-chart.json').then(r => r.json()),
    ]);

    DATA = { people, tickets, orgChart };

    for (const person of people) {
      peopleById.set(person.employee_id, person);
    }

    for (const team of orgChart.teams) {
      const members = team.members.map(id => peopleById.get(id)).filter(Boolean);
      const teamTickets = tickets.filter(ticket => ticket.assigned_team === team.team);
      const openTickets = teamTickets.filter(ticket => ticket.status === 'open');
      teamsByName.set(team.team, {
        ...team,
        memberObjects: members,
        tickets: teamTickets,
        openTickets,
        openTicketCount: openTickets.length,
      });
    }

    for (const person of people) {
      searchIndex.push({
        type: 'person',
        id: person.employee_id,
        text: [person.name, person.role, person.team, ...person.skills, ...person.allocations.map(a => a.project)].join(' ').toLowerCase(),
        data: person,
      });
    }

    for (const ticket of tickets) {
      searchIndex.push({
        type: 'ticket',
        id: ticket.ticket_id,
        text: [ticket.description, ticket.category, ticket.assigned_team].join(' ').toLowerCase(),
        data: ticket,
      });
    }
  }

  const app = document.getElementById('app');

  function navigate() {
    const hash = location.hash || '#/';
    if (hash.startsWith('#/person/')) {
      renderPerson(hash.replace('#/person/', ''));
    } else if (hash.startsWith('#/team/')) {
      renderTeam(decodeURIComponent(hash.replace('#/team/', '')));
    } else {
      renderSearch();
    }
  }

  function allocColor(pct) {
    if (pct > 100) return 'red';
    if (pct > 80) return 'amber';
    return 'green';
  }

  function allocBarHTML(pct) {
    const color = allocColor(pct);
    const width = Math.min(pct, 120);
    return '<span class="finder-alloc">'
      + '<span class="finder-alloc__track"><span class="finder-alloc__fill finder-alloc__fill--' + color + '" style="width:' + (width * 100 / 120) + '%"></span></span>'
      + '<span class="finder-alloc__label finder-alloc__label--' + color + '">' + pct + '%</span>'
      + '</span>';
  }

  function priorityStatus(priority) {
    const map = {
      high: 'error',
      medium: 'pending',
      low: 'success',
    };
    return map[priority] || 'pending';
  }

  function priorityLabel(priority) {
    const s = priority.charAt(0).toUpperCase() + priority.slice(1);
    return '<span class="ons-status ons-status--' + priorityStatus(priority) + '">' + s + '</span>';
  }

  function statusDot(status) {
    const mod = status === 'resolved' ? 'resolved' : 'open';
    return '<span class="finder-status-inline"><span class="finder-status-dot finder-status-dot--' + mod + '"></span>' + status + '</span>';
  }

  function formatCategory(cat) {
    return cat.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  let debounceTimer;
  function debounce(fn, ms) {
    return (...args) => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => fn(...args), ms);
    };
  }

  let lastSearchQuery = '';

  function renderSearch(restoredQuery) {
    const query = restoredQuery || lastSearchQuery || '';
    lastSearchQuery = query;

    let html = '';
    html += '<section aria-labelledby="finder-title">';
    html += '<h1 id="finder-title" class="ons-u-fs-xl ons-u-mb-s">Find people, teams and service work</h1>';
    html += '<p class="ons-u-mb-m">Search by person, team, role, skill, ticket category, or project.</p>';
    html += '<div class="finder-search-wrap">';
    html += '<label class="ons-label" for="finder-search">Search the directorate</label>';
    html += '<input id="finder-search" class="ons-input ons-input--text" type="search" placeholder="Search people, skills, teams, or topics" value="' + query.replace(/"/g, '&quot;') + '">';
    html += '</div>';
    html += '</section>';

    if (!query.trim()) {
      html += '<section class="ons-u-mt-l" aria-labelledby="team-browse">';
      html += '<h2 id="team-browse" class="finder-section-heading">Browse teams</h2>';
      html += '<div class="ons-grid ons-grid--flex">';
      for (const [name, team] of teamsByName) {
        html += '<div class="ons-grid__col ons-col-4@m ons-u-mb-s">';
        html += '<a class="finder-panel-link" href="#/team/' + encodeURIComponent(name) + '">';
        html += '<article class="finder-team-card">';
        html += '<h3 class="ons-u-fs-m ons-u-mb-xs">' + name + '</h3>';
        html += '<p>' + team.headcount + ' people</p>';
        html += '<p><span class="ons-status ons-status--' + (team.openTicketCount > 0 ? 'pending' : 'success') + '">' + team.openTicketCount + ' open tickets</span></p>';
        html += '</article>';
        html += '</a>';
        html += '</div>';
      }
      html += '</div>';
      html += '</section>';
    } else {
      const q = query.toLowerCase().trim();
      const matchedPeople = [];
      const matchedTickets = [];
      const matchedTeamNames = new Set();

      for (const entry of searchIndex) {
        if (!entry.text.includes(q)) continue;
        if (entry.type === 'person') matchedPeople.push(entry.data);
        if (entry.type === 'ticket') matchedTickets.push(entry.data);
      }

      for (const [name] of teamsByName) {
        if (name.toLowerCase().includes(q)) matchedTeamNames.add(name);
      }
      for (const ticket of matchedTickets) {
        matchedTeamNames.add(ticket.assigned_team);
      }

      if (!matchedPeople.length && !matchedTickets.length && !matchedTeamNames.size) {
        html += '<div class="ons-panel ons-panel--info ons-panel--no-title ons-u-mt-l">';
        html += '<span class="ons-panel__assistive-text ons-u-vh">Important information:</span>';
        html += '<div class="ons-panel__body"><p>No results found. Try a different search term.</p></div>';
        html += '</div>';
      }

      if (matchedPeople.length) {
        html += '<section class="ons-u-mt-l" aria-labelledby="people-results">';
        html += '<h2 id="people-results" class="finder-section-heading">People (' + matchedPeople.length + ')</h2>';
        for (const person of matchedPeople) {
          html += '<a class="finder-panel-link" href="#/person/' + person.employee_id + '">';
          html += '<article class="finder-result-panel">';
          html += '<h3 class="ons-u-fs-m ons-u-mb-no">' + person.name + '</h3>';
          html += '<p class="finder-inline-meta">' + person.role + ' · ' + person.team + ' · ' + person.location + '</p>';
          html += '<p class="ons-u-mt-s">' + person.skills.map(skill => '<span class="finder-tag">' + skill + '</span>').join('') + '</p>';
          html += allocBarHTML(person.total_allocation);
          html += '</article>';
          html += '</a>';
        }
        html += '</section>';
      }

      if (matchedTeamNames.size) {
        html += '<section class="ons-u-mt-l" aria-labelledby="team-results">';
        html += '<h2 id="team-results" class="finder-section-heading">Teams (' + matchedTeamNames.size + ')</h2>';
        html += '<div class="ons-grid ons-grid--flex">';
        for (const teamName of matchedTeamNames) {
          const team = teamsByName.get(teamName);
          if (!team) continue;
          html += '<div class="ons-grid__col ons-col-4@m ons-u-mb-s">';
          html += '<a class="finder-panel-link" href="#/team/' + encodeURIComponent(teamName) + '">';
          html += '<article class="finder-team-card">';
          html += '<h3 class="ons-u-fs-m ons-u-mb-xs">' + teamName + '</h3>';
          html += '<p>' + team.headcount + ' people</p>';
          html += '<p><span class="ons-status ons-status--' + (team.openTicketCount > 0 ? 'pending' : 'success') + '">' + team.openTicketCount + ' open tickets</span></p>';
          html += '</article>';
          html += '</a>';
          html += '</div>';
        }
        html += '</div>';
        html += '</section>';
      }

      if (matchedTickets.length) {
        html += '<section class="ons-u-mt-l" aria-labelledby="ticket-results">';
        html += '<h2 id="ticket-results" class="finder-section-heading">Related tickets (' + matchedTickets.length + ')</h2>';
        for (const ticket of matchedTickets) {
          html += '<article class="finder-result-panel">';
          html += '<p class="ons-u-mb-xs">' + priorityLabel(ticket.priority) + '<span class="finder-badge">' + statusDot(ticket.status) + '</span></p>';
          html += '<p class="finder-inline-meta">' + formatCategory(ticket.category) + '</p>';
          html += '<p class="ons-u-mt-xs ons-u-mb-xs">' + ticket.description + '</p>';
          html += '<p class="finder-inline-meta">' + ticket.ticket_id + ' · <a href="#/team/' + encodeURIComponent(ticket.assigned_team) + '">' + ticket.assigned_team + '</a></p>';
          html += '</article>';
        }
        html += '</section>';
      }
    }

    app.innerHTML = html;

    const input = document.getElementById('finder-search');
    if (input) {
      input.focus();
      input.addEventListener('input', debounce(e => {
        const value = e.target.value;
        lastSearchQuery = value;
        const cursor = e.target.selectionStart;
        renderSearch(value);
        const newInput = document.getElementById('finder-search');
        if (newInput) {
          newInput.focus();
          newInput.setSelectionRange(cursor, cursor);
        }
      }, 200));
    }
  }

  const segmentPalette = ['#206095', '#003c57', '#0f8243', '#fe781f', '#d0021b', '#4263a5', '#8f2d56'];

  function tenure(startDate) {
    const start = new Date(startDate);
    const now = new Date();
    let years = now.getFullYear() - start.getFullYear();
    let months = now.getMonth() - start.getMonth();
    if (months < 0) {
      years -= 1;
      months += 12;
    }
    const out = [];
    if (years > 0) out.push(years + ' year' + (years !== 1 ? 's' : ''));
    if (months > 0) out.push(months + ' month' + (months !== 1 ? 's' : ''));
    return out.join(', ') || 'Less than a month';
  }

  function renderPerson(id) {
    const person = peopleById.get(id);
    if (!person) {
      app.innerHTML = '<p>Person not found.</p>';
      return;
    }

    const color = allocColor(person.total_allocation);

    let leadsTeam = null;
    for (const team of teamsByName.values()) {
      if (team.team_lead === person.employee_id) {
        leadsTeam = team;
        break;
      }
    }

    let html = '';
    html += '<a href="#/" class="ons-u-fs-s">Back to search</a>';
    html += '<section class="ons-u-mt-m" aria-labelledby="person-name">';
    html += '<h1 id="person-name" class="ons-u-fs-xl ons-u-mb-xs">' + person.name + '</h1>';
    html += '<p class="ons-u-mb-xs">' + person.role + ' <span class="ons-status ons-status--pending">' + person.grade + '</span></p>';
    html += '<p class="finder-inline-meta"><a href="#/team/' + encodeURIComponent(person.team) + '">' + person.team + '</a> · ' + person.location + '</p>';
    html += '<p class="finder-inline-meta">Joined ' + new Date(person.start_date).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' }) + ' · ' + tenure(person.start_date) + '</p>';
    html += '</section>';

    html += '<section class="ons-u-mt-l" aria-labelledby="skills-title">';
    html += '<h2 id="skills-title" class="ons-u-fs-m">Skills</h2>';
    html += '<p>' + person.skills.map(skill => '<span class="finder-tag">' + skill + '</span>').join('') + '</p>';
    html += '</section>';

    html += '<section class="ons-u-mt-l" aria-labelledby="allocations-title">';
    html += '<h2 id="allocations-title" class="ons-u-fs-m">Project allocations</h2>';
    html += '<div class="finder-stacked-wrap">';
    html += '<div class="finder-stacked">';
    for (let i = 0; i < person.allocations.length; i++) {
      const allocation = person.allocations[i];
      const bg = segmentPalette[i % segmentPalette.length];
      const title = allocation.project + ': ' + allocation.percentage + '%';
      const label = allocation.percentage > 15 ? allocation.project + ' ' + allocation.percentage + '%' : allocation.percentage + '%';
      html += '<div class="finder-stacked__segment" style="width:' + allocation.percentage + '%;background:' + bg + '" title="' + title + '">' + label + '</div>';
    }
    html += '</div>';
    html += '<div class="finder-legend">';
    for (let i = 0; i < person.allocations.length; i++) {
      const allocation = person.allocations[i];
      const bg = segmentPalette[i % segmentPalette.length];
      html += '<span><span class="finder-legend__swatch" style="background:' + bg + '"></span>' + allocation.project + ' (' + allocation.percentage + '%)</span>';
    }
    html += '</div>';
    html += '<p class="ons-u-mt-s"><strong>Total allocation:</strong> <span class="finder-alloc__label finder-alloc__label--' + color + '">' + person.total_allocation + '%</span></p>';
    html += '</div>';
    html += '</section>';

    if (leadsTeam) {
      const others = leadsTeam.memberObjects.filter(m => m.employee_id !== person.employee_id);
      html += '<section class="ons-u-mt-l" aria-labelledby="team-lead-title">';
      html += '<h2 id="team-lead-title" class="ons-u-fs-m">Leads: <a href="#/team/' + encodeURIComponent(leadsTeam.team) + '">' + leadsTeam.team + '</a></h2>';
      html += '<p>' + others.map(m => '<a href="#/person/' + m.employee_id + '">' + m.name + '</a> (' + m.role + ')').join(' · ') + '</p>';
      html += '</section>';
    }

    app.innerHTML = html;
  }

  function renderTeam(name) {
    const team = teamsByName.get(name);
    if (!team) {
      app.innerHTML = '<p>Team not found.</p>';
      return;
    }

    const lead = peopleById.get(team.team_lead);
    const avgAlloc = Math.round(team.memberObjects.reduce((sum, member) => sum + member.total_allocation, 0) / team.memberObjects.length);
    const overAlloc = team.memberObjects.filter(member => member.total_allocation > 100).length;
    const totalTickets = team.tickets.length;
    const resolvedTickets = team.tickets.filter(ticket => ticket.status === 'resolved').length;

    let html = '';
    html += '<a href="#/" class="ons-u-fs-s">Back to search</a>';
    html += '<section class="ons-u-mt-m" aria-labelledby="team-name">';
    html += '<h1 id="team-name" class="ons-u-fs-xl ons-u-mb-xs">' + team.team + '</h1>';
    html += '<p class="finder-inline-meta">Led by: ' + (lead ? '<a href="#/person/' + lead.employee_id + '">' + lead.name + '</a>' : 'Unknown') + '</p>';
    html += '</section>';

    html += '<section class="ons-u-mt-l" aria-labelledby="team-kpis">';
    html += '<h2 id="team-kpis" class="ons-u-fs-m">Team snapshot</h2>';
    html += '<div class="ons-grid ons-grid--flex">';
    html += '<div class="ons-grid__col ons-col-3@m ons-u-mb-s"><div class="finder-team-card"><p class="ons-u-fs-xl ons-u-mb-no"><strong>' + team.headcount + '</strong></p><p>People</p></div></div>';
    html += '<div class="ons-grid__col ons-col-3@m ons-u-mb-s"><div class="finder-team-card"><p class="ons-u-fs-xl ons-u-mb-no"><strong>' + avgAlloc + '%</strong></p><p>Average allocation</p></div></div>';
    html += '<div class="ons-grid__col ons-col-3@m ons-u-mb-s"><div class="finder-team-card"><p class="ons-u-fs-xl ons-u-mb-no"><strong>' + overAlloc + '</strong></p><p>Over-allocated</p></div></div>';
    html += '<div class="ons-grid__col ons-col-3@m ons-u-mb-s"><div class="finder-team-card"><p class="ons-u-fs-xl ons-u-mb-no"><strong>' + team.openTicketCount + '/' + totalTickets + '</strong></p><p>Open/total tickets</p></div></div>';
    html += '</div>';
    html += '</section>';

    html += '<section class="ons-u-mt-l" aria-labelledby="members-title">';
    html += '<h2 id="members-title" class="ons-u-fs-m">Team members</h2>';
    html += '<div class="ons-table-scrollable__content">';
    html += '<table class="ons-table">';
    html += '<thead class="ons-table__head"><tr class="ons-table__row"><th class="ons-table__header" scope="col">Name</th><th class="ons-table__header" scope="col">Role</th><th class="ons-table__header" scope="col">Grade</th><th class="ons-table__header" scope="col">Allocation</th><th class="ons-table__header" scope="col">Location</th></tr></thead>';
    html += '<tbody class="ons-table__body">';
    for (const member of team.memberObjects) {
      const over = member.total_allocation > 100;
      html += '<tr class="ons-table__row finder-clickable-row' + (over ? ' finder-row-alert' : '') + '" onclick="location.hash=\'#/person/' + member.employee_id + '\'">';
      html += '<td class="ons-table__cell"><a href="#/person/' + member.employee_id + '"><strong>' + member.name + '</strong></a></td>';
      html += '<td class="ons-table__cell">' + member.role + '</td>';
      html += '<td class="ons-table__cell"><span class="ons-status ons-status--pending">' + member.grade + '</span></td>';
      html += '<td class="ons-table__cell">' + allocBarHTML(member.total_allocation) + '</td>';
      html += '<td class="ons-table__cell">' + member.location + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div></section>';

    const priorityOrder = { high: 0, medium: 1, low: 2 };
    const openSorted = [...team.openTickets].sort((a, b) => (priorityOrder[a.priority] || 9) - (priorityOrder[b.priority] || 9));

    html += '<section class="ons-u-mt-l" aria-labelledby="open-tickets">';
    html += '<h2 id="open-tickets" class="ons-u-fs-m">Open tickets (' + team.openTicketCount + ')</h2>';
    if (!openSorted.length) {
      html += '<p>No open tickets.</p>';
    } else {
      for (const ticket of openSorted) {
        html += '<article class="finder-result-panel">';
        html += '<p class="ons-u-mb-xs">' + priorityLabel(ticket.priority) + '<span class="finder-badge">' + statusDot('open') + '</span></p>';
        html += '<p class="finder-inline-meta">' + formatCategory(ticket.category) + '</p>';
        html += '<p class="ons-u-mt-xs ons-u-mb-xs">' + ticket.description + '</p>';
        html += '<p class="finder-inline-meta">' + ticket.ticket_id + ' · Opened ' + ticket.created_date + '</p>';
        html += '</article>';
      }
    }
    html += '</section>';

    html += '<section class="ons-u-mt-l" aria-labelledby="resolved-tickets">';
    html += '<h2 id="resolved-tickets" class="ons-u-fs-m">Resolved tickets</h2>';
    html += '<p>' + resolvedTickets + ' ticket' + (resolvedTickets !== 1 ? 's' : '') + ' resolved</p>';
    html += '</section>';

    app.innerHTML = html;
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await loadData();
    window.addEventListener('hashchange', navigate);
    navigate();
  });
  </script>
  <script>
    (function() {
      var scripts = ['https://cdn.ons.gov.uk/sdc/design-system/73.3.0/scripts/main.js'];
      var scriptTag = document.createElement('script');
      if (!('noModule' in scriptTag)) {
        for (var i = 0; i < scripts.length; i++) {
          scripts[i] = scripts[i].replace('.js', '.es5.js');
        }
      }
      for (var j = 0; j < scripts.length; j++) {
        var el = document.createElement('script');
        el.src = scripts[j];
        document.body.appendChild(el);
      }
    })();
  </script>
</body>
</html>
