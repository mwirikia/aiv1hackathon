<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Leader View — Corporate Services</title>
  <link rel="stylesheet" href="https://cdn.ons.gov.uk/sdc/design-system/73.3.0/css/main.css">
  <link rel="stylesheet" href="css/chat-widget.css">
  <style>
    html { scroll-behavior: smooth; }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; }
    .kpi-card { background: #fff; border: 1px solid #707071; padding: 16px; text-align: center; }
    .kpi-card .kpi-value { font-size: 2rem; font-weight: 700; line-height: 1.2; }
    .kpi-card .kpi-label { font-size: 0.875rem; color: #707071; }
    .kpi-value--red { color: #d0021b; }
    .kpi-value--amber { color: #fe781f; }
    .kpi-value--green { color: #0f8243; }

    .ons-table__row--warn .ons-table__cell { background: #fae1e1; }

    /* Allocation bar */
    .tl-alloc-bar { display: inline-flex; align-items: center; gap: 8px; }
    .tl-alloc-bar__track { width: 100px; height: 12px; background: #e2e2e3; border-radius: 4px; overflow: hidden; display: block; position: relative; }
    .tl-alloc-bar__fill { height: 100%; border-radius: 4px; min-width: 4px; display: block; }
    .tl-alloc-bar__fill--green { background: #0f8243; }
    .tl-alloc-bar__fill--amber { background: #fe781f; }
    .tl-alloc-bar__fill--red { background: #d0021b; }
    .tl-alloc-bar__marker { position: absolute; top: 0; bottom: 0; width: 2px; background: #222; opacity: 0.5; }
    .tl-alloc-bar__label { font-size: 0.8125rem; font-weight: 700; white-space: nowrap; }
    .tl-alloc-bar__label--red { color: #d0021b; }
    .tl-alloc-bar__label--amber { color: #fe781f; }
    .tl-alloc-bar__label--green { color: #0f8243; }

    /* Select styling */
    .ons-input--select { font-size: 1rem; padding: 8px 12px; border: 2px solid #222; font-family: inherit; min-width: 280px; }
    .ons-input--select:focus { outline: 3px solid #fd0; }
  </style>
</head>
<body>
  <div class="ons-page">
    <div class="ons-page__content">

      <header class="ons-header ons-header--internal" role="banner">
        <div class="ons-header__top">
          <div class="ons-container ons-container--wide">
            <div class="ons-header__grid-top ons-grid ons-grid-flex ons-grid-flex--between ons-grid-flex--vertical-center ons-grid-flex--no-wrap ons-grid--gutterless">
              <div class="ons-grid__col ons-col-auto">
                <div class="ons-header__title">Directorate of Corporate Services</div>
              </div>
            </div>
          </div>
        </div>
        <div class="ons-navigation-wrapper">
          <div class="ons-container ons-container--wide">
            <nav class="ons-navigation ons-navigation--main" aria-label="Main menu">
              <ul class="ons-navigation__list">
                <li class="ons-navigation__item"><a class="ons-navigation__link" href="dashboard.html">Director's Dashboard</a></li>
                <li class="ons-navigation__item"><a class="ons-navigation__link" href="operations.html">Operations View</a></li>
                <li class="ons-navigation__item"><a class="ons-navigation__link" href="tickets.html">Ticket View</a></li>
                <li class="ons-navigation__item ons-navigation__item--active"><a class="ons-navigation__link" href="team-leader.html">Team Leader</a></li>
                <li class="ons-navigation__item"><a class="ons-navigation__link" href="index.html">Staff Finder</a></li>
              </ul>
            </nav>
          </div>
        </div>
      </header>

      <main id="main-content">
        <div class="ons-container ons-container--wide ons-u-mt-l">
          <div id="team-leader-panel"></div>
        </div>
      </main>

      <footer class="ons-footer">
        <div class="ons-footer__body ons-page__footer">
          <div class="ons-container ons-container--wide">
            <div class="ons-footer__license ons-u-mb-l">
              Prototype — AI Hackathon V1 April 2026 · Challenge 4: Knowing your own organisation
            </div>
          </div>
        </div>
      </footer>

    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/insights.js"></script>
  <script src="js/team-leader.js"></script>
  <script src="js/chat-widget.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      await loadData();
      renderTeamLeader();
    });
  </script>
  <script>
    (function() {
      var s = ['https://cdn.ons.gov.uk/sdc/design-system/73.3.0/scripts/main.js'];
      var c = document.createElement('script');
      if (!('noModule' in c)) { for (var i = 0; i < s.length; i++) { s[i] = s[i].replace('.js', '.es5.js'); } }
      for (var i = 0; i < s.length; i++) { var e = document.createElement('script'); e.src = s[i]; document.body.appendChild(e); }
    })();
  </script>
</body>
</html>
