<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket View — Corporate Services</title>
  <link rel="stylesheet" href="https://cdn.ons.gov.uk/sdc/design-system/73.3.0/css/main.css">
  <link rel="stylesheet" href="css/chat-widget.css">
  <style>
    html { scroll-behavior: smooth; }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; }
    .kpi-card { background: #fff; border: 1px solid #707071; padding: 16px; text-align: center; }
    .kpi-card .kpi-value { font-size: 2rem; font-weight: 700; line-height: 1.2; }
    .kpi-card .kpi-label { font-size: 0.875rem; color: #707071; }
    .kpi-card--link { text-decoration: none; cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s; }
    .kpi-card--link:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); border-color: #206095; }
    .kpi-card--link:focus { outline: 3px solid #fd0; outline-offset: 0; }
    .kpi-value--red { color: #d0021b; }
    .kpi-value--amber { color: #fe781f; }
    .kpi-value--green { color: #0f8243; }

    .ons-table__row--warn .ons-table__cell { background: #fae1e1; }

    .ops-ticket-card {
      background: #fff; border: 1px solid #707071; border-left: 5px solid #d0021b;
      padding: 16px 20px; margin-bottom: 12px;
    }
    .ops-ticket-card__header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
    .ops-ticket-card__cat { font-size: 0.875rem; color: #707071; }
    .ops-ticket-card__id { font-size: 0.8125rem; color: #707071; margin-left: auto; }
    .ops-ticket-card__desc { font-size: 0.9375rem; margin-bottom: 8px; line-height: 1.5; }
    .ops-ticket-card__meta { font-size: 0.8125rem; color: #707071; margin-bottom: 8px; }
    .ops-ticket-card__team { font-size: 0.8125rem; color: #505050; margin-top: 8px; padding-top: 8px; border-top: 1px solid #e2e2e3; }

    .ops-ttl-badge { display: inline-block; color: #fff; font-size: 0.75rem; font-weight: 700; padding: 2px 10px; border-radius: 3px; }

    .ops-ticket-card__ttl-bar { margin: 6px 0; }
    .ops-ttl-track { width: 100%; height: 8px; background: #e2e2e3; border-radius: 4px; overflow: hidden; position: relative; }
    .ops-ttl-fill { height: 100%; border-radius: 4px; display: block; }
    .ops-ttl-marker { position: absolute; top: 0; bottom: 0; right: 0; width: 2px; background: #222; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="ons-page">
    <div class="ons-page__content">

      <header class="ons-header ons-header--internal" role="banner">
        <div class="ons-header__top">
          <div class="ons-container ons-container--wide">
            <div class="ons-header__grid-top ons-grid ons-grid-flex ons-grid-flex--between ons-grid-flex--vertical-center ons-grid-flex--no-wrap ons-grid--gutterless">
              <div class="ons-grid__col ons-col-auto">
                <div class="ons-header__title">Ticket View</div>
              </div>
              <div class="ons-grid__col ons-col-auto" style="display:flex;gap:16px;">
                <a href="dashboard.html" style="color:#fff;font-size:0.875rem;text-decoration:underline;">Director's Dashboard</a>
                <a href="operations.html" style="color:#fff;font-size:0.875rem;text-decoration:underline;">Operations View</a>
                <a href="index.html" style="color:#fff;font-size:0.875rem;text-decoration:underline;">Staff Finder</a>
              </div>
            </div>
          </div>
        </div>
        <div class="ons-header__main">
          <div class="ons-container ons-container--wide">
            <div class="ons-header__title">Directorate of Corporate Services</div>
          </div>
        </div>
      </header>

      <main id="main-content">
        <div class="ons-container ons-container--wide ons-u-mt-l">
          <div id="tickets-panel"></div>
        </div>
      </main>

      <footer class="ons-footer">
        <div class="ons-footer__body ons-page__footer">
          <div class="ons-container ons-container--wide">
            <div class="ons-footer__license ons-u-mb-l">
              Prototype — AI Hackathon V1 April 2026 · Challenge 4: Knowing your own organisation
            </div>
          </div>
        </div>
      </footer>

    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/insights.js"></script>
  <script src="js/tickets.js"></script>
  <script src="js/chat-widget.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      await loadData();
      renderTickets();
    });
  </script>
  <script>
    (function() {
      var s = ['https://cdn.ons.gov.uk/sdc/design-system/73.3.0/scripts/main.js'];
      var c = document.createElement('script');
      if (!('noModule' in c)) { for (var i = 0; i < s.length; i++) { s[i] = s[i].replace('.js', '.es5.js'); } }
      for (var i = 0; i < s.length; i++) { var e = document.createElement('script'); e.src = s[i]; document.body.appendChild(e); }
    })();
  </script>
</body>
</html>
